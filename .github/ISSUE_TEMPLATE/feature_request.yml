name: Feature request
description: Suggest an improvement for experiments, reproducibility, or docs.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and interface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: reproducibility
    attributes:
      label: Reproducibility impact
      description: Note expected effects on config, seeds, runtime, and outputs.

